<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Colonizer - Mission Control</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: url('onmoon.gif') center/cover no-repeat;
            color: #fff;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
        }

        .earth-section {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-start;  /* Changed from center to flex-start */
            justify-content: center;
            background: #000;
            padding: 40px;
        }

        .earth-container {
            position: relative;
            width: 140%;
            height: 140%;   /* Reduced from 170% */
            display: flex;
            align-items: flex-start;  /* Changed from center to flex-start */
            justify-content: center;
            animation: zoomIn 2s ease-out forwards;
            margin-top: -10vh;  /* Added negative margin to move up */
        }

        .earth-img {
            max-height: 140vh;  /* Reduced from 170vh */
            width: auto;
            object-fit: contain;
            transform-origin: center;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes zoomIn {
            from {
                transform: scale(1.2);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-section {
            padding: 30px;
            background: rgba(13, 28, 53, 0.98);
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: slideIn 1s ease-out;
            max-height: 100vh;        /* Added max-height */
            overflow-y: auto;         /* Added scrolling */
            scrollbar-width: thin;    /* For Firefox */
            scrollbar-color: #66fcf1 rgba(102, 252, 241, 0.1); /* For Firefox */
        }

        /* Add custom scrollbar styling for Chrome/Edge/Safari */
        .game-section::-webkit-scrollbar {
            width: 8px;
        }

        .game-section::-webkit-scrollbar-track {
            background: rgba(102, 252, 241, 0.1);
            border-radius: 4px;
        }

        .game-section::-webkit-scrollbar-thumb {
            background: #66fcf1;
            border-radius: 4px;
        }

        .game-section::-webkit-scrollbar-thumb:hover {
            background: #45a29e;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .mission-info {
            background: rgba(6, 18, 36, 0.8);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #66fcf1;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.2);
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .section-container {
            background: rgba(6, 18, 36, 0.8);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #66fcf1;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .section-container:hover {
            transform: translateY(-5px);
        }

        .planets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .planet-card {
            background: rgba(23, 38, 63, 0.8);
            border: 1px solid #66fcf1;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .planet-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(102, 252, 241, 0.2),
                transparent
            );
            transition: 0.5s;
        }

        .planet-card:hover::before {
            left: 100%;
        }

        .planet-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 252, 241, 0.3);
        }

        .resource-bar {
            margin: 15px 0;
        }

        .progress {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #66fcf1, #45a29e);
            width: 0%;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        button {
            background: linear-gradient(45deg, #66fcf1, #45a29e);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
        }

        h2, h3 {
            color: #66fcf1;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
            margin-bottom: 20px;
        }

        .resource-tools .tool-section {
            margin-top: 10px;
            padding: 10px;
            background: rgba(23, 38, 63, 0.8);
            border-radius: 10px;
        }

        .resource-tools button {
            width: 100%;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="earth-section">
        <div class="earth-container">
            <img src="earthmoon.webp" alt="Earth and Moon" class="earth-img">
        </div>
    </div>

    <div class="game-section">
        <div class="mission-info">
            <h2>Mission Control</h2>
            <p>Company: <span id="companyDisplay"></span></p>
            <p>Commander: <span id="commanderDisplay"></span></p>
        </div>

        <div class="section-container">
            <h3>Available Planets</h3>
            <div class="planets-grid">
                <div class="planet-card" onclick="selectPlanet('Mars')">
                    <h3>Mars</h3>
                    <p>Distance: 225M km</p>
                </div>
                <div class="planet-card" onclick="selectPlanet('Moon')">
                    <h3>Moon</h3>
                    <p>Distance: 384K km</p>
                </div>
            </div>
        </div>

        <div class="section-container">
            <h3>Resources</h3>
            <div class="resource-list">
                <div class="resource-item">
                    <span>Wood:</span>
                    <span id="woodCount">0</span>
                </div>
                <div class="resource-item">
                    <span>Water:</span>
                    <span id="waterCount">0</span>
                </div>
                <div class="resource-item">
                    <span>Metal:</span>
                    <span id="metalCount">0</span>
                </div>
            </div>
        </div>

        <div class="section-container resource-tools">
            <button onclick="toggleSection('resourceTools')">Resources Tools</button>
            <div id="resourceTools" class="hidden">
                <div class="tool-section">
                    <button onclick="toggleSection('woodTools')">Gather Wood</button>
                    <div id="woodTools" class="hidden">
                        <button id="buyWoodcutter" onclick="buyTool('wood')">Buy Woodcutter (Level 1)</button>
                    </div>
                </div>
                <div class="tool-section">
                    <button onclick="toggleSection('waterTools')">Gather Water</button>
                    <div id="waterTools" class="hidden">
                        <button id="buyWaterAbsorber" onclick="buyTool('water')">Buy Water Absorber (Level 1)</button>
                    </div>
                </div>
                <div class="tool-section">
                    <button onclick="toggleSection('metalTools')">Gather Metals</button>
                    <div id="metalTools" class="hidden">
                        <button id="buyMetalExtractor" onclick="buyTool('metal')">Buy Metal Extractor (Level 1)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const company = localStorage.getItem('companyName');
            const commander = localStorage.getItem('commanderName');
            
            document.getElementById('companyDisplay').textContent = company;
            document.getElementById('commanderDisplay').textContent = commander;
            
            if (!company || !commander) {
                window.location.href = 'index.html';
            }
            updateCosts();
            setInterval(generateResources, 1000);
        }

        const playerResources = {
            wood: 100,
            water: 100,
            metal: 100
        };

        const tools = {
            wood: { level: 0, cost: { wood: 70, water: 50, metal: 70 }, generation: 2 },
            water: { level: 0, cost: { wood: 50, water: 70, metal: 70 }, generation: 2 },
            metal: { level: 0, cost: { wood: 70, water: 50, metal: 70 }, generation: 2 }
        };

        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            section.classList.toggle('hidden');
        }

        function updateCosts() {
            document.getElementById('buyWoodcutter').textContent = `Buy Woodcutter (Level ${tools.wood.level + 1}) - W: ${tools.wood.cost.wood}, M: ${tools.wood.cost.metal}, Wa: ${tools.wood.cost.water}`;
            document.getElementById('buyWaterAbsorber').textContent = `Buy Water Absorber (Level ${tools.water.level + 1}) - W: ${tools.water.cost.wood}, M: ${tools.water.cost.metal}, Wa: ${tools.water.cost.water}`;
            document.getElementById('buyMetalExtractor').textContent = `Buy Metal Extractor (Level ${tools.metal.level + 1}) - W: ${tools.metal.cost.wood}, M: ${tools.metal.cost.metal}, Wa: ${tools.metal.cost.water}`;
        }

        function buyTool(type) {
            const tool = tools[type];
            if (playerResources.wood >= tool.cost.wood && playerResources.water >= tool.cost.water && playerResources.metal >= tool.cost.metal) {
                playerResources.wood -= tool.cost.wood;
                playerResources.water -= tool.cost.water;
                playerResources.metal -= tool.cost.metal;
                tool.level++;
                tool.cost.wood = Math.floor(tool.cost.wood * 1.5);
                tool.cost.water = Math.floor(tool.cost.water * 1.5);
                tool.cost.metal = Math.floor(tool.cost.metal * 1.5);
                updateResourceCounts();
                updateCosts();
            } else {
                alert('Not enough resources!');
            }
        }

        function generateResources() {
            playerResources.wood += tools.wood.level * tools.wood.generation;
            playerResources.water += tools.water.level * tools.water.generation;
            playerResources.metal += tools.metal.level * tools.metal.generation;
            updateResourceCounts();
        }

        function updateResourceCounts() {
            document.getElementById('woodCount').textContent = playerResources.wood;
            document.getElementById('waterCount').textContent = playerResources.water;
            document.getElementById('metalCount').textContent = playerResources.metal;
        }

        function selectPlanet(planet) {
            alert(`Mission to ${planet} selected!`);
        }
    </script>
</body>
</html>
