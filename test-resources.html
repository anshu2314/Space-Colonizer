<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Resource System</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            text-align: center;
        }

        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(6, 18, 36, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #66fcf1;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.3);
        }

        .test-btn {
            display: inline-block;
            margin: 15px;
            padding: 15px 30px;
            background: linear-gradient(45deg, #66fcf1, #45a29e);
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .test-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
        }

        h1 {
            color: #66fcf1;
            text-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
            margin-bottom: 30px;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🚀 Resource System Test</h1>
        <p>Test the new modular resource system with individual tool pages!</p>
        
        <div>
            <a href="resources.html" class="test-btn">🏭 Open Resource Center</a>
        </div>
        
        <div>
            <a href="tool-wood.html" class="test-btn">🌲 Woodcutter Tool</a>
            <a href="tool-water.html" class="test-btn">💧 Water Absorber Tool</a>
            <a href="tool-metal.html" class="test-btn">🔩 Metal Extractor Tool</a>
        </div>
        
        <div>
            <a href="game.html" class="test-btn">← Back to Main Game</a>
        </div>
    </div>
</body>
</html>
